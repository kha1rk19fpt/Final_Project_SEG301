<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WikiSearch — Semantic Wikipedia Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero" id="hero">
    <div class="hero-logo"><span class="logo-wiki">Wiki</span><span class="logo-search">Search</span></div>
    <p class="hero-tagline">Semantic search across Wikipedia — dense vectors and BM25, fused with weighted RRF</p>

    <form class="search-form" id="searchForm" role="search" aria-label="Search Wikipedia">
      <div class="search-box">
        <input id="searchInput" type="search" class="search-input"
               placeholder="What is quantum entanglement?"
               autocomplete="off" aria-label="Search query" />
        <div class="search-controls">
          <label class="top-k-label" for="topKSelect">Top</label>
          <select id="topKSelect" class="top-k-select" aria-label="Number of results">
            <option value="3">3</option><option value="5" selected>5</option>
            <option value="8">8</option><option value="10">10</option>
            <option value="15">15</option><option value="20">20</option>
          </select>
          <button id="searchBtn" type="submit" class="search-btn">Search</button>
        </div>
      </div>
    </form>

    <div class="suggestions" id="suggestions" aria-label="Suggested queries">
      <button class="pill" data-query="History of artificial intelligence">History of AI</button>
      <button class="pill" data-query="How does photosynthesis work">Photosynthesis</button>
      <button class="pill" data-query="What is black hole">Black holes</button>
      <button class="pill" data-query="The French Revolution causes">French Revolution</button>
      <button class="pill" data-query="DNA structure and function">DNA structure</button>
    </div>
  </header>

  <main class="results-section" id="resultsSection" role="main" aria-live="polite">

    <div class="status-bar" id="statusBar" hidden>
      <div class="status-left">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText" class="status-text"></span>
      </div>
      <div class="status-meta">
        <span class="meta-chip" id="metaQuery"></span>
        <span class="meta-chip time-chip" id="metaTime"></span>
      </div>
    </div>

    <div class="loading-state" id="loadingState" hidden aria-label="Searching">
      <div class="loading-bar" aria-hidden="true"><span></span></div>
      <p class="loading-text">Retrieving and re-ranking</p>
    </div>

    <div class="error-state" id="errorState" hidden role="alert">
      <h2 class="error-title">The search API did not respond</h2>
      <p class="error-desc" id="errorDesc"></p>
      <button class="retry-btn" id="retryBtn">Run the search again</button>
    </div>

    <div class="empty-state" id="emptyState" hidden role="status">
      <h2 class="empty-title">Nothing matched that query</h2>
      <p class="empty-desc">Rephrase it, or use the words an encyclopedia would use.</p>
    </div>

    <div class="results-list" id="resultsList" role="list"></div>
  </main>

  <footer class="footer" id="footer">
    <p>
      <span class="footer-logo">WikiSearch</span> · SEG301 final project ·
      <a href="http://127.0.0.1:8000/docs" target="_blank" rel="noopener" class="footer-link">API docs</a>
      · <a href="http://127.0.0.1:8000/health" target="_blank" rel="noopener" class="footer-link">Health</a>
    </p>
  </footer>

  <!-- ── RESULT CARD TEMPLATE ── -->
  <template id="resultCardTemplate">
    <article class="result-card" role="listitem">
      <div class="card-header">
        <div class="rank-badge" aria-label="Rank"></div>
        <div class="card-title-group">
          <h2 class="card-title"></h2>
          <a class="card-url" href="#" target="_blank" rel="noopener noreferrer"></a>
        </div>
        <div class="card-header-actions">
          <span class="source-badge" title="Content source"></span>
          <button class="expand-btn" aria-expanded="false" aria-label="Read the article text">
            <span class="expand-btn-text">Read</span>
            <span class="caret" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <div class="card-body">
        <div class="content-preview"></div>

        <div class="score-dashboard">

          <div class="score-card"
               title="Final score từ Asymmetric Weighted RRF — cao hơn = liên quan hơn">
            <div class="score-label">Final score</div>
            <div class="score-value final-score-val"></div>
            <div class="score-bar"><div class="score-fill final-fill"></div></div>
          </div>

          <div class="score-card"
               title="Best chunk Cosine distance từ ChromaDB — thấp hơn = liên quan hơn. N/A nếu bài chỉ đến từ BM25.">
            <div class="score-label">Cosine distance</div>
            <div class="score-value-row">
              <div class="score-value cosine-score-val"></div>
              <span class="pool-rank-badge cosine-rank-badge"></span>
            </div>
            <div class="score-bar"><div class="score-fill cosine-fill"></div></div>
          </div>

          <div class="score-card"
               title="BM25 keyword relevance score — cao hơn = khớp keyword hơn. N/A nếu không có trong BM25 pool.">
            <div class="score-label">BM25</div>
            <div class="score-value-row">
              <div class="score-value bm25-score-val"></div>
              <span class="pool-rank-badge bm25-rank-badge"></span>
            </div>
            <div class="score-bar"><div class="score-fill bm25-fill"></div></div>
          </div>

          <div class="score-card chunks-card" title="Số chunk khớp từ vector search">
            <div class="score-label">Matched chunks</div>
            <div class="score-value chunks-val"></div>
          </div>

        </div><!-- /.score-dashboard -->
      </div><!-- /.card-body -->

      <div class="card-expanded" hidden>
        <div class="expand-tabs">
          <button class="expand-tab active" data-tab="rendered">Article</button>
          <button class="expand-tab" data-tab="raw">Raw text</button>
        </div>
        <div class="expanded-content markdown-body" data-view="rendered"></div>
        <div class="expanded-content raw-content" data-view="raw" hidden></div>
        <div class="expand-footer">
          <span class="text-source-badge"></span>
          <a class="open-wiki-btn" href="#" target="_blank" rel="noopener noreferrer">Open on Wikipedia</a>
        </div>
      </div>
    </article>
  </template>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
